spring:
  datasource:
    url: jdbc:h2:mem:guess_number_game;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
security:
  jwt:
    secret: test-demo-secret-key-for-hs256-must-be-at-least-32-bytes-long
