spring:
  application:
    name: guess-number-game
  profiles:
    default: dev
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/guess_number_game?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:guess_user}
    password: ${SPRING_DATASOURCE_PASSWORD:guess_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

game:
  default-turns: 5
  buy-turns-amount: 5
  buy-turns-price: ${GAME_BUY_TURNS_PRICE:10000}
  win-rate: 0.05
  min-number: 1
  max-number: 5

payment:
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:}
    hash-secret: ${VNPAY_HASH_SECRET:}
    payment-url: ${VNPAY_PAYMENT_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    return-url: ${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payments/vnpay-return}
    frontend-return-url: ${VNPAY_FRONTEND_RETURN_URL:http://localhost:5173/}

security:
  jwt:
    secret: ${JWT_SECRET:dev-demo-secret-key-for-hs256-must-be-at-least-32-bytes-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
