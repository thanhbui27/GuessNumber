services:
  mysql:
    image: mysql:8.0
    container_name: guess-number-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-guess_number_game}
      MYSQL_USER: ${MYSQL_USER:-guess_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-guess_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: guess-number-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-guess_number_game}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-guess_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-guess_password}
      JWT_SECRET: ${JWT_SECRET:-compose-demo-secret-key-for-hs256-must-be-at-least-32-bytes-long}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api/v1
    container_name: guess-number-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
